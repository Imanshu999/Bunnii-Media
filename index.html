<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bunnii Media - Full-Stack Cloud Ecosystem</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg-primary: #05070b; --accent-color: #ff3366; }
        body { background-color: var(--bg-primary); color: white; font-family: sans-serif; padding: 20px; }
        #authScreen { position:fixed; top:0; left:0; width:100%; height:100%; background:#05070b; z-index:9999; display:flex; justify-content:center; align-items:center; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div style="text-align:center;">
            <h2>Bunnii Media Login</h2>
            <select id="countrySelect" style="width:100%; margin-bottom:10px; padding:5px;"></select>
            <input type="email" id="authEmail" placeholder="Email"><br>
            <input type="password" id="authPassword" placeholder="Password"><br>
            <button onclick="handleAuth()">Authorize Node</button>
        </div>
    </div>

    <div id="home">
        <textarea id="postText" placeholder="Broadcast your tech logs..."></textarea>
        <button onclick="createPost()">Deploy Post</button>
        <div id="feedArea"></div>
    </div>

    <script>
        const firebaseConfig = { /* अपना कॉन्फ़िगरेशन यहाँ रखें */ };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // दुनिया के सभी देश लोड करने के लिए फंक्शन
        fetch('https://restcountries.com/v3.1/all')
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById('countrySelect');
                data.sort((a, b) => a.name.common.localeCompare(b.name.common));
                data.forEach(country => {
                    let option = document.createElement('option');
                    option.value = country.name.common;
                    option.text = `${country.flag} ${country.name.common}`;
                    select.appendChild(option);
                });
            });

        function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPassword').value;
            const country = document.getElementById('countrySelect').value;
            
            auth.signInWithEmailAndPassword(email, pass)
            .catch(() => auth.createUserWithEmailAndPassword(email, pass))
            .then((userCredential) => {
                db.ref('users/' + userCredential.user.uid).set({ country: country });
                location.reload();
            });
        }

        function createPost() {
            const description = document.getElementById('postText').value;
            if(!description) return;
            db.ref('posts').push({
                user: auth.currentUser.email.split('@')[0],
                text: description,
                timestamp: Date.now()
            });
            document.getElementById('postText').value = "";
        }

        db.ref('posts').on('value', (snapshot) => {
            const feed = document.getElementById('feedArea');
            feed.innerHTML = "";
            snapshot.forEach(child => {
                const data = child.val();
                feed.innerHTML += `<div><strong>@${data.user}:</strong> ${data.text}</div>`;
            });
        });
    </script>
</body>
</html>
